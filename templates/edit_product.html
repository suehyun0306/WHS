{% extends "base.html" %}
{% block title %}상품 수정{% endblock %}
{% block content %}
<h2>상품 수정</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  제목: <input type="text" name="title" value="{{ product.title }}" required><br>
  설명: <br>
  <textarea name="description" rows="4" cols="50" required>{{ product.description }}</textarea><br>
  가격: <input type="text" name="price" value="{{ format_price(product.price_cents) }}" required><br>
  <button type="submit">업데이트</button>
</form>
{% endblock %}
