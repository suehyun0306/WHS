{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="card card-form">
  <div class="form-head">
    <h2>어서 오세요!</h2>
    <p>안전하게 로그인하고 거래를 시작하세요.</p>
  </div>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>사용자명</label>
    <input type="text" name="username" required>
    <label>비밀번호</label>
    <input type="password" name="password" required>
    <button type="submit">로그인</button>
  </form>
  <p class="form-note">계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a> 하세요.</p>
</div>
{% endblock %}
