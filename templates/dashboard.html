{% extends "base.html" %}
{% block title %}대시보드{% endblock %}
{% block content %}
<h2>대시보드</h2>
<h3>등록된 상품</h3>
<form method="get" action="{{ url_for('dashboard') }}">
  <input type="text" name="q" value="{{ query }}" placeholder="상품 검색" />
  <button type="submit">검색</button>
</form>
<ul>
  {% for product in products %}
    <li>
      <a href="{{ url_for('view_product', product_id=product.id) }}">{{ product.title }}</a>
      - 가격: {{ format_price(product.price_cents) }}
    </li>
  {% else %}
    <li>검색 결과가 없습니다.</li>
  {% endfor %}
</ul>
<p><a href="{{ url_for('new_product') }}">새 상품 등록</a></p>

<h3>실시간 채팅</h3>
<div id="chat">
  <ul id="messages"></ul>
  <input id="chat_input" type="text" placeholder="메시지를 입력하세요">
  <button id="chat_send" type="button">전송</button>
</div>
{% endblock %}
