{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<div class="card card-form">
  <div class="form-head">
    <h2>새로운 시작</h2>
    <p>간편하게 회원가입하고 우리 장터를 둘러보세요.</p>
  </div>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>사용자명</label>
    <input type="text" name="username" required>
    <label>비밀번호</label>
    <input type="password" name="password" required>
    <button type="submit">회원가입</button>
  </form>
  <p class="form-note">이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a></p>
</div>
{% endblock %}
