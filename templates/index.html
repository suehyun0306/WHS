{% extends "base.html" %}
{% block title %}환영합니다{% endblock %}
{% block content %}
<div class="page-hero home-hero">

    <span class="eyebrow">따뜻한 장터</span>
    <h1>내 주변 보물을 함께 나누는 공간</h1>
    <p>심플하고 친근한 중고 거래 플랫폼입니다. 원하는 물건을 찾고, 간편하게 거래해보세요.</p>
    <div class="hero-buttons">
      <a class="button" href="{{ url_for('products') }}">상품 목록 보기</a>
